# Codemagic configuration file

# This script generates Gradle wrapper files if they are missing

# Run this before building

jobs:
  android-release:
    pre-steps:
      - name: Generate Gradle wrapper
        script: |
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper..."
            ./gradlew wrapper
          fi
    steps:
      # Your build steps go here

  android-debug:
    pre-steps:
      - name: Generate Gradle wrapper
        script: |
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper..."
            ./gradlew wrapper
          fi
    steps:
      # Your build steps go here
