workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.vexiq.trinkettracker"
      java: 17

    scripts:
      - name: Generate Gradle wrapper if missing
        script: |
          cd $CM_BUILD_DIR
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.4
          fi
          chmod +x gradlew

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build Android release APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true

  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      java: 17

    scripts:
      - name: Generate Gradle wrapper if missing
        script: |
          cd $CM_BUILD_DIR
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.4
          fi
          chmod +x gradlew

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build Android debug APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
