workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.vexiq.trinkettracker"
      java: 17

    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build Android release APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - euan.m.obrien@gmail.com
        notify:
          success: true
          failure: true

  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      java: 17

    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build Android debug APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
